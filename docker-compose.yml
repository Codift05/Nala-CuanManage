name: nala-dev

x-service-defaults: &service-defaults
  init: true
  restart: unless-stopped
  stop_grace_period: 20s
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  db:
    <<: *service-defaults
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nala_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nala_password}
      POSTGRES_DB: ${POSTGRES_DB:-nala_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: ${DB_MEMORY_LIMIT:-1g}
    cpus: ${DB_CPU_LIMIT:-1.0}

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: ${REDIS_MEMORY_LIMIT:-256m}
    cpus: ${REDIS_CPU_LIMIT:-0.5}

  backend:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      TS_NODE_FILES: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-nala_user}:${POSTGRES_PASSWORD:-nala_password}@db:5432/${POSTGRES_DB:-nala_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-nala_dev_only_change_me}
    command: ["sh", "-c", "npx prisma generate && npx prisma db push && npm run seed && npm run dev"]
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_generated:/app/generated
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    mem_limit: ${BACKEND_MEMORY_LIMIT:-1g}
    cpus: ${BACKEND_CPU_LIMIT:-1.0}

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  backend_generated:
